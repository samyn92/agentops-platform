name: Dependency Update

on:
  repository_dispatch:
    types: [dependency-update]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-dependency:
    name: Bump ${{ github.event.client_payload.component }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Update dependency version
        env:
          COMPONENT: ${{ github.event.client_payload.component }}
          VERSION: ${{ github.event.client_payload.version }}
          SOURCE: ${{ github.event.client_payload.source }}
        run: |
          CHART="charts/agentops-platform/Chart.yaml"
          VALUES="charts/agentops-platform/values.yaml"
          echo "Bumping ${COMPONENT} to ${VERSION} (from ${SOURCE})"

          # Memory is an inline template (not a subchart dependency).
          # Its version lives in values.yaml as memory.image.tag.
          # All other components are subchart dependencies in Chart.yaml.
          if [ "${COMPONENT}" = "agentops-memory" ]; then
            yq -i '.memory.image.tag = env(VERSION)' "$VALUES"
            echo "Updated values.yaml memory.image.tag:"
            yq '.memory.image' "$VALUES"
          else
            yq -i "(.dependencies[] | select(.name == env(COMPONENT))).version = env(VERSION)" "$CHART"
            echo "Updated Chart.yaml:"
            cat "$CHART"
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Login to GHCR (for OCI deps)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Add Grafana repo
        run: helm repo add grafana https://grafana.github.io/helm-charts && helm repo update

      - name: Helm Dependency Update
        run: helm dependency update charts/agentops-platform

      - name: Helm Lint
        run: helm lint charts/agentops-platform

      - name: Helm Template
        run: helm template test charts/agentops-platform --namespace agent-system

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          add-paths: |
            charts/agentops-platform/Chart.yaml
            charts/agentops-platform/Chart.lock
            charts/agentops-platform/values.yaml
          branch: deps/${{ github.event.client_payload.component }}-${{ github.event.client_payload.version }}
          commit-message: "deps: bump ${{ github.event.client_payload.component }} to ${{ github.event.client_payload.version }}"
          title: "deps: bump ${{ github.event.client_payload.component }} to ${{ github.event.client_payload.version }}"
          body: |
            Automated dependency update triggered by [${{ github.event.client_payload.source }}](https://github.com/samyn92/${{ github.event.client_payload.source }}) release.

            | Component | Version |
            |-----------|---------|
            | `${{ github.event.client_payload.component }}` | `${{ github.event.client_payload.version }}` |

            Helm lint and template checks passed.
          labels: dependencies,automated
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
