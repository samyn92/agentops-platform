name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Login to GHCR (for OCI deps)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Add Grafana repo
        run: helm repo add grafana https://grafana.github.io/helm-charts && helm repo update

      - name: Helm Dependency Build
        run: helm dependency build charts/agentops-platform

      - name: Helm Lint
        run: helm lint charts/agentops-platform

      - name: Helm Template (default values)
        run: helm template test charts/agentops-platform --namespace agent-system

      - name: Helm Template (minimal — operator only)
        run: |
          helm template test charts/agentops-platform --namespace agent-system \
            --set agentops-console.enabled=false \
            --set memory.enabled=false \
            --set tempo.enabled=false \
            --set createNamespace=false
