name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  # =========================================================================
  # Helm: lint, package, push OCI to GHCR, create GitHub Release
  # =========================================================================
  helm-chart:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set chart version and appVersion
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/agentops-platform/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/agentops-platform/Chart.yaml

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Add HTTP chart repos
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add nats https://nats-io.github.io/k8s/helm/charts
          helm repo update

      - name: Helm Dependency Update
        run: helm dependency update charts/agentops-platform

      - name: Helm Lint
        run: helm lint charts/agentops-platform

      - name: Helm Template
        run: helm template test charts/agentops-platform --namespace agent-system

      - name: Helm Package
        run: helm package charts/agentops-platform --destination dist/

      - name: Push Helm chart to GHCR OCI
        run: helm push dist/agentops-platform-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "AgentOps Platform ${{ github.ref_name }}" \
            --generate-notes \
            dist/agentops-platform-${{ steps.version.outputs.version }}.tgz
