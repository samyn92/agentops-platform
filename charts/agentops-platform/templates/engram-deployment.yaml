{{- if .Values.engram.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentops-platform.fullname" . }}-engram
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "agentops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: memory
    app.kubernetes.io/name: engram
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: engram
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: engram
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: memory
        agents.agentops.io/component: memory
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: engram
          image: "{{ .Values.engram.image.repository }}:{{ .Values.engram.image.tag }}"
          imagePullPolicy: {{ .Values.engram.image.pullPolicy }}
          env:
            - name: ENGRAM_DATA_DIR
              value: /data
            - name: ENGRAM_HOST
              value: "0.0.0.0"
          ports:
            - name: http
              containerPort: 7437
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            {{- toYaml .Values.engram.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agentops-platform.fullname" . }}-engram-data
      {{- with .Values.engram.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.engram.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.engram.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
