{{- if .Values.engram.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agentops-platform.fullname" . }}-engram-data
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "agentops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: memory
    app.kubernetes.io/name: engram
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.engram.persistence.size }}
  {{- if .Values.engram.persistence.storageClassName }}
  storageClassName: {{ .Values.engram.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
