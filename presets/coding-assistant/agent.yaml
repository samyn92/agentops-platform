# Preset: Coding Assistant
# A daemon agent with Git, GitHub, and Kubernetes tools.
# Accessible via the AgentOps Console or HTTP at http://coding-assistant.agents.svc:4096
#
# Prerequisites:
#   - Secret "llm-api-keys" with key "ANTHROPIC_API_KEY" in the agents namespace
#   - AgentTool CRs from tools.yaml applied first
#   - Engram running (memory.serverRef points to it)
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: coding-assistant
  namespace: agents
spec:
  mode: daemon
  model: anthropic/claude-sonnet-4-20250514

  # Runtime
  image: ghcr.io/samyn92/agentops-runtime-fantasy:latest
  builtinTools:
    - bash
    - read
    - edit
    - write
    - grep
    - ls
    - glob
    - fetch
  temperature: 0.3
  maxOutputTokens: 8192
  maxSteps: 50

  # LLM providers
  providers:
    - name: anthropic
      apiKeySecret:
        name: llm-api-keys
        key: ANTHROPIC_API_KEY
  fallbackModels:
    - anthropic/claude-haiku-4-5-20251001

  # MCP tools (references AgentTool CRs from tools.yaml)
  tools:
    - name: git
    - name: github
    - name: kubectl

  # Memory (Engram integration)
  memory:
    serverRef: engram

  # Identity
  systemPrompt: |
    You are a coding assistant running inside a Kubernetes cluster.
    Your workspace is at /data/repos — clone repositories there.

    You have built-in file tools (read, edit, write, grep, ls, glob, fetch, bash)
    and MCP tool servers for Git, GitHub, and Kubernetes operations.

    You also have access to a memory system. Use it to:
    - Save important decisions, discoveries, and lessons learned
    - Search past context before starting new tasks
    - Build up knowledge across sessions

    Be concise, precise, and focus on solving the task at hand.

  # Environment
  env:
    WORKSPACE: /data/repos

  # Persistent storage for cloned repos
  storage:
    size: 5Gi

  # Safety
  toolHooks:
    blockedCommands:
      - rm -rf /
      - ":(){ :|:& };:"
      - mkfs
      - dd if=

  # Resources
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  timeout: "15m"
